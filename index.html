<!DOCTYPE html>
<html lang="en-us">

<head>
  <base href="https://cdn.jsdelivr.net/gh/bubbls/youtube-playables@main/stick-war-legacy/">
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">

  <title>YT Game Wrapper WebGL Template</title>
  <link rel="stylesheet" href="TemplateData/style.css" nonce="Ax8R9C9qo3eDtuZdYWZNng">
  <script src="https://cdn.jsdelivr.net/gh/bubbls/youtube-playables@main/ytgame.js" nonce="Ax8R9C9qo3eDtuZdYWZNng"></script>
</head>

<body>
  <div id="unity-container" class="unity-desktop">
    <canvas id="unity-canvas" width=100% height=100% tabindex="-1"></canvas>
    <div id="unity-loading-bar">
      <div id="unity-logo"></div>
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>
    <div id="unity-warning"> </div>
  </div>

  <script src="unarchiver.min.js" nonce="Ax8R9C9qo3eDtuZdYWZNng"></script>
  <script nonce="Ax8R9C9qo3eDtuZdYWZNng">
    // --- DEBUGGER: CATCH SYSTEM ERRORS ---
    window.onerror = function(message, source, lineno, colno, error) {
      alert("SYSTEM ERROR:\n" + message + "\nLine: " + lineno);
      return false;
    };

    var container = document.querySelector("#unity-container");
    var canvas = document.querySelector("#unity-canvas");
    var loadingBar = document.querySelector("#unity-loading-bar");
    var progressBarFull = document.querySelector("#unity-progress-bar-full");
    var warningBanner = document.querySelector("#unity-warning");

    // Modified to alert errors so you can see them without a console
    function unityShowBanner(msg, type) {
      if (type == 'error') {
        alert("UNITY ERROR:\n" + msg);
      }
      console.log(type + ": " + msg);
    }

    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/WebGL.loader.js";
    var config = {
      dataUrl: buildUrl + "/WebGL.data",
      frameworkUrl: buildUrl + "/WebGL.framework.js",
      codeUrl: buildUrl + "/WebGL.wasm",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "Stick Page",
      productName: "Stick War: Legacy",
      productVersion: "2025.1.143",
      showBanner: unityShowBanner,
    };

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      var meta = document.createElement('meta');
      meta.name = 'viewport';
      meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
      document.getElementsByTagName('head')[0].appendChild(meta);
      container.className = "unity-mobile";
      canvas.className = "unity-mobile";
      config.devicePixelRatio = Math.min(window.devicePixelRatio || 1, 2);
    } else {
      canvas.style.width = "100%";
      canvas.style.height = "100%";
      config.devicePixelRatio = Math.min(window.devicePixelRatio || 1, 2);
    }

    loadingBar.style.display = "block";

    const subZipStr = '.zip';
    const subWASMStr = '.wasm';
    const subJSStr = '.js';
    const subDataStr = '.data';
    
    loadResources = (callback) => {
      var dataUrl = config.dataUrl;
      var shouldDecompress = true;
      if (!dataUrl.includes(subZipStr)) {
        if (UrlExists(dataUrl + subZipStr)) {
          dataUrl = dataUrl + subZipStr;
        } else {
          shouldDecompress = false;
        }
      }

      if (shouldDecompress) {
        var blobTypeData = GetBlobType(dataUrl);
        DecompressFile(dataUrl, blobTypeData, (file) => {
          config.dataUrl = file;
          LoadWASM(callback);
        });
      } else {
        LoadWASM(callback);
      }
    }

    loadZipData = (url, callback) => {
      fetch(url)
        .then(response => {
          if(!response.ok) throw new Error("Failed to fetch: " + url);
          return response.blob();
        })
        .then(blob => {
          callback(blob);
        })
        .catch(err => alert("FETCH ERROR:\n" + err.message));
    }

    function LoadWASM(callback) {
      var codeUrl = config.codeUrl;
      var shouldDecompress = true;
      if (!codeUrl.includes(subZipStr)) {
        if (UrlExists(codeUrl + subZipStr)) {
          codeUrl = codeUrl + subZipStr;
        } else {
          shouldDecompress = false;
        }
      }

      if (shouldDecompress) {
        var blobTypeWASM = GetBlobType(codeUrl);
        DecompressFile(codeUrl, blobTypeWASM, (file) => {
          config.codeUrl = file;
          callback();
        });
      } else {
        callback();
      }
    }

    function GetBlobType(urlToCheck) {
      var blobType = 'application/octet-stream';
      if (urlToCheck.includes(subWASMStr)) blobType = 'application/wasm';
      else if (urlToCheck.includes(subJSStr)) blobType = 'text/javascript';
      return blobType;
    }

    function UrlExists(urlToCheck) {
      try {
        var httpReq = new XMLHttpRequest();
        httpReq.open('HEAD', urlToCheck, false);
        httpReq.send();
        return httpReq.status != 404;
      } catch (e) {
        return false;
      }
    }

    function DecompressFile(file, blobMimeType, callback) {
      let decompressedFile;
      loadZipData(file, (f) => {
        Unarchiver.open(f).then(async function (archive) {
          for (let entry of archive.entries) {
            if (entry.is_file) {
              let entryRead = await entry.read();
              let entryData = await entryRead.arrayBuffer();
              let dataBlob = new Blob([new Uint8Array(entryData)], { type: blobMimeType });
              decompressedFile = window.URL.createObjectURL(dataBlob);
            }
          }
          callback(decompressedFile);
        }).catch(err => alert("DECOMPRESSION ERROR:\n" + err.message));
      });
    }

    var unityGameInstance = null;
    function InitUnitySection() {
      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          unityGameInstance = unityInstance;
          loadingBar.style.display = "none";
        }).catch((message) => {
          alert("UNITY INSTANCE CRASH:\n" + message);
        });
      };
      document.body.appendChild(script);
    }

    loadResources(InitUnitySection);
  </script>
</body>
</html>
